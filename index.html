  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💧 Water Flow Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1b2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      user-select: none;
    }

    #header {
      display: flex;
      gap: 24px;
      align-items: center;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 1.9rem;
      color: #fff;
      letter-spacing: 1px;
    }

    .badge {
      background: rgba(255,255,255,0.12);
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 1rem;
      font-weight: bold;
      color: #90CAF9;
    }

    canvas {
      border-radius: 18px;
      cursor: crosshair;
      touch-action: none;
      display: block;
      box-shadow: 0 0 50px rgba(41,182,246,0.25);
    }

    #hint {
      color: rgba(255,255,255,0.75);
      font-size: 1rem;
      text-align: center;
      min-height: 1.4rem;
      margin-top: 10px;
    }

    #controls {
      display: flex;
      gap: 14px;
      margin-top: 12px;
    }

    .btn {
      padding: 16px 40px;
      border: none;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.12s, filter 0.12s;
      font-family: inherit;
      min-width: 130px;
      min-height: 54px;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.15); }
    .btn:active:not(:disabled) { transform: translateY(1px); }
    .btn:disabled { opacity: 0.35; cursor: default; }

    #flowBtn {
      background: linear-gradient(135deg, #00C853, #00695C);
      color: #fff;
      box-shadow: 0 4px 14px rgba(0,200,83,0.4);
    }
    #clearBtn {
      background: linear-gradient(135deg, #FF7043, #BF360C);
      color: #fff;
      box-shadow: 0 4px 14px rgba(255,112,67,0.35);
    }
  </style>
</head>
<body>

<div id="header">
  <h1>💧 Water Flow</h1>
  <div class="badge" id="lvlBadge">Level 1</div>
  <div class="badge" id="scoreBadge">Score: 0</div>
</div>

<canvas id="canvas"></canvas>

<div id="hint">Draw a path from the tank outlet down to the cup!</div>

<div id="controls">
  <button class="btn" id="clearBtn" onclick="clearPath()">🗑 Clear</button>
  <button class="btn" id="flowBtn" onclick="startFlow()" disabled>▶ Flow!</button>
</div>

<script>
// ─── Canvas setup ────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

const CW = Math.min(window.innerWidth  - 24, 620);
const CH = Math.min(window.innerHeight - 200, 620);
canvas.width  = CW;
canvas.height = CH;

// ─── Constants ───────────────────────────────────────────────
const TW = 88,  TH = 64;   // tank width/height
const CUW = 64, CUH = 52;  // cup width/height
const SNAP_R = 54;          // radius to start drawing near outlet

// ─── Levels (positions scale with canvas) ────────────────────
const LEVELS = [
  { tank: { x: 40,        y: 40 },       cup: { x: CW - 120,  y: CH - 110 } },
  { tank: { x: CW - 128,  y: 40 },       cup: { x: 40,        y: CH - 110 } },
  { tank: { x: 40,        y: 40 },       cup: { x: CW / 2 - 32, y: CH - 110 } },
  { tank: { x: CW / 2 - 44, y: 40 },    cup: { x: CW - 120,  y: CH / 2 - 26 } },
  { tank: { x: CW - 128,  y: 40 },       cup: { x: CW / 2 - 32, y: CH - 110 } },
];

let levelIdx = 0;
const lv = () => LEVELS[levelIdx % LEVELS.length];

function outletPos() {
  const l = lv();
  return { x: l.tank.x + TW / 2, y: l.tank.y + TH + 14 };
}
function cupTopCenter() {
  const l = lv();
  return { x: l.cup.x + CUW / 2, y: l.cup.y };
}

// ─── State ───────────────────────────────────────────────────
let score     = 0;
let state     = 'DRAWING'; // DRAWING | FLOWING | FILLING | WIN | LOSE
let path      = [];
let drawing   = false;
let flowT     = 0;
let cumDist   = [];
let totalLen  = 0;
let trail     = [];        // water drop trail
let sparks    = [];        // splash/celebrate particles
let tick      = 0;
let cupFill   = 0;         // 0→1, animates when water lands in cup

// ─── Input helpers ───────────────────────────────────────────
function xy(e) {
  const r  = canvas.getBoundingClientRect();
  const sx = CW / r.width,  sy = CH / r.height;
  const s  = e.touches ? e.touches[0] : e;
  return { x: (s.clientX - r.left) * sx, y: (s.clientY - r.top) * sy };
}
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

// ─── Drawing input ───────────────────────────────────────────
canvas.addEventListener('mousedown',  e => startDraw(xy(e)));
canvas.addEventListener('mousemove',  e => moveDraw(xy(e)));
canvas.addEventListener('mouseup',    ()  => endDraw());
canvas.addEventListener('mouseleave', ()  => endDraw());
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(xy(e)); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); moveDraw(xy(e));  }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); endDraw();         }, { passive: false });

function startDraw(p) {
  if (state !== 'DRAWING') return;
  const o = outletPos();
  if (dist(p, o) <= SNAP_R) {
    drawing = true;
    path = [{ ...o }];
    hint('Draw the path down to the cup! 🖊️');
    document.getElementById('flowBtn').disabled = true;
  } else {
    hint('Start right at the tank outlet! ⬇');
  }
}

function moveDraw(p) {
  if (!drawing || state !== 'DRAWING') return;
  const last = path[path.length - 1];
  if (dist(p, last) > 4) path.push({ ...p });
}

function endDraw() {
  if (!drawing) return;
  drawing = false;
  if (path.length < 4) { path = []; return; }

  const last = path[path.length - 1];
  const ct   = cupTopCenter();
  if (dist(last, ct) < CUW + 20) {
    path.push({ x: ct.x, y: lv().cup.y });
    document.getElementById('flowBtn').disabled = false;
    hint('Path ready — press Flow! 🚀');
  } else {
    hint('Reach all the way to the cup! Try again.');
    path = [];
  }
}

// ─── Controls ────────────────────────────────────────────────
function clearPath() {
  if (state === 'FLOWING' || state === 'FILLING') return;
  path  = [];
  trail = [];
  sparks = [];
  state  = 'DRAWING';
  flowT  = 0;
  cupFill = 0;
  document.getElementById('flowBtn').disabled  = true;
  document.getElementById('clearBtn').disabled = false;
  hint('Draw a path from the tank outlet down to the cup!');
}

function startFlow() {
  if (path.length < 2 || state !== 'DRAWING') return;
  state = 'FLOWING';
  flowT = 0;
  trail = [];
  document.getElementById('flowBtn').disabled  = true;
  document.getElementById('clearBtn').disabled = true;
  hint('Water is flowing… 💧');

  cumDist  = [0];
  for (let i = 1; i < path.length; i++)
    cumDist.push(cumDist[i-1] + dist(path[i], path[i-1]));
  totalLen = cumDist[cumDist.length - 1];
}

function hint(msg) { document.getElementById('hint').textContent = msg; }

// ─── Path math ───────────────────────────────────────────────
function posOnPath(t) {
  const target = t * totalLen;
  for (let i = 1; i < path.length; i++) {
    if (cumDist[i] >= target) {
      const s = (target - cumDist[i-1]) / (cumDist[i] - cumDist[i-1]);
      return {
        x: path[i-1].x + (path[i].x - path[i-1].x) * s,
        y: path[i-1].y + (path[i].y - path[i-1].y) * s,
      };
    }
  }
  return { ...path[path.length - 1] };
}

function waterLandsInCup() {
  const end = path[path.length - 1];
  const cup = lv().cup;
  return end.x >= cup.x - 8
      && end.x <= cup.x + CUW + 8
      && end.y >= cup.y - 12
      && end.y <= cup.y + CUH + 12;
}

// ─── Win / Lose ───────────────────────────────────────────────
function onWin() {
  // Water arrived — start filling the cup
  state   = 'FILLING';
  cupFill = 0;
  hint('Filling up! 💧');
}

function triggerWin() {
  state = 'WIN';
  const pts = 10 * (levelIdx + 1);
  score += pts;
  document.getElementById('scoreBadge').textContent = `Score: ${score}`;
  hint(`🎉 Woohoo! +${pts} points!`);

  // Splash sparks from cup top
  const cup = lv().cup;
  const cx  = cup.x + CUW / 2;
  for (let i = 0; i < 45; i++) {
    const a   = Math.random() * Math.PI * 2;
    const spd = Math.random() * 7 + 2;
    sparks.push({
      x: cx, y: cup.y + 6,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 6,
      r:  Math.random() * 6 + 3,
      life: 1,
      decay: 0.016 + Math.random() * 0.012,
      hue: 190 + Math.random() * 40,
    });
  }

  setTimeout(() => {
    levelIdx++;
    document.getElementById('lvlBadge').textContent = `Level ${levelIdx + 1}`;
    cupFill = 0;
    clearPath();
    document.getElementById('clearBtn').disabled = false;
    hint('Next level! Draw a new path 🎯');
  }, 2800);
}

function onLose() {
  state = 'LOSE';
  hint('💧 Missed the cup! Try again.');
  setTimeout(() => {
    clearPath();
    document.getElementById('clearBtn').disabled = false;
  }, 1800);
}

// ─── Render helpers ──────────────────────────────────────────
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  if (ctx.roundRect) {
    ctx.roundRect(x, y, w, h, r);
  } else {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }
}

function drawBg() {
  const g = ctx.createLinearGradient(0, 0, 0, CH);
  g.addColorStop(0, '#0d1b2e');
  g.addColorStop(1, '#102a4c');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, CW, CH);

  // Twinkling stars
  for (let i = 0; i < 28; i++) {
    const sx = (i * 71 + 19) % CW;
    const sy = (i * 43 + 13) % (CH * 0.55);
    const a  = 0.25 + (Math.sin(tick * 0.04 + i) * 0.5 + 0.5) * 0.55;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx, sy, 1.4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawTank(x, y) {
  ctx.save();

  // Body
  ctx.shadowColor = '#42A5F5';
  ctx.shadowBlur  = 14;
  ctx.fillStyle   = '#0D47A1';
  rrect(x, y, TW, TH, 9);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Inner window
  ctx.fillStyle = '#1565C0';
  rrect(x + 5, y + 5, TW - 10, TH - 10, 5);
  ctx.fill();

  // Water + wave
  const waveH = 14 + Math.sin(tick * 0.05) * 3;
  ctx.save();
  rrect(x + 5, y + 5, TW - 10, TH - 10, 5);
  ctx.clip();
  ctx.fillStyle = '#0288D1';
  ctx.fillRect(x + 5, y + waveH, TW - 10, TH - 5 - waveH);
  ctx.fillStyle = '#29B6F6';
  ctx.beginPath();
  ctx.moveTo(x + 5, y + waveH);
  for (let wx = 0; wx <= TW - 10; wx += 7) {
    const wy = Math.sin(tick * 0.08 + wx * 0.35) * 3;
    ctx.lineTo(x + 5 + wx, y + waveH + wy);
  }
  ctx.lineTo(x + TW - 5, y + waveH);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Outline
  ctx.strokeStyle = '#64B5F6';
  ctx.lineWidth   = 2.5;
  rrect(x, y, TW, TH, 9);
  ctx.stroke();

  // Label
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = 'bold 11px Segoe UI, Arial';
  ctx.textAlign = 'center';
  ctx.fillText('💧 TANK', x + TW / 2, y + 14);

  // Outlet pipe
  ctx.fillStyle   = '#1565C0';
  ctx.strokeStyle = '#90CAF9';
  ctx.lineWidth   = 1.5;
  ctx.fillRect(x + TW / 2 - 7, y + TH, 14, 17);
  ctx.strokeRect(x + TW / 2 - 7, y + TH, 14, 17);

  // Pulsing arrow
  const pa = Math.sin(tick * 0.1) * 0.3 + 0.7;
  ctx.globalAlpha = pa;
  ctx.fillStyle   = '#4FC3F7';
  ctx.beginPath();
  ctx.moveTo(x + TW / 2 - 6, y + TH + 17);
  ctx.lineTo(x + TW / 2 + 6, y + TH + 17);
  ctx.lineTo(x + TW / 2,     y + TH + 27);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();
}

function drawCup(x, y) {
  ctx.save();

  // ── Water fill (clipped to trapezoid) ──
  if (cupFill > 0) {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x,           y);
    ctx.lineTo(x + CUW,     y);
    ctx.lineTo(x + CUW - 7, y + CUH);
    ctx.lineTo(x + 7,       y + CUH);
    ctx.closePath();
    ctx.clip();

    const yt = y + CUH * (1 - cupFill);   // water surface y

    // Water body
    ctx.fillStyle = '#0277BD';
    ctx.fillRect(x, yt, CUW, CUH);

    // Animated wave on surface
    ctx.fillStyle = '#29B6F6';
    ctx.beginPath();
    ctx.moveTo(x, yt);
    for (let wx = 0; wx <= CUW; wx += 5) {
      const wy = Math.sin(tick * 0.12 + wx * 0.45) * 2.5;
      ctx.lineTo(x + wx, yt + wy);
    }
    ctx.lineTo(x + CUW, yt);
    ctx.lineTo(x + CUW, y + CUH);
    ctx.lineTo(x,       y + CUH);
    ctx.closePath();
    ctx.fill();

    // Shimmer highlight
    ctx.globalAlpha = 0.18;
    ctx.fillStyle   = '#E1F5FE';
    ctx.fillRect(x + 8, yt + 4, 10, CUH * cupFill - 6);
    ctx.globalAlpha = 1;

    ctx.restore();
  }

  // ── Cup outline ──
  ctx.beginPath();
  ctx.moveTo(x,           y);
  ctx.lineTo(x + CUW,     y);
  ctx.lineTo(x + CUW - 7, y + CUH);
  ctx.lineTo(x + 7,       y + CUH);
  ctx.closePath();

  if (cupFill <= 0) {
    ctx.fillStyle = 'rgba(2, 136, 209, 0.18)';
    ctx.fill();
  }

  ctx.shadowColor = '#29B6F6';
  ctx.shadowBlur  = 16;
  ctx.strokeStyle = '#42A5F5';
  ctx.lineWidth   = 3.5;
  ctx.lineJoin    = 'round';
  ctx.stroke();
  ctx.shadowBlur  = 0;

  // Rim highlight
  ctx.strokeStyle = 'rgba(144,202,249,0.6)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(x + 4, y + 4);
  ctx.lineTo(x + CUW - 4, y + 4);
  ctx.stroke();

  // Label (hide once mostly full)
  if (cupFill < 0.6) {
    ctx.fillStyle = '#90CAF9';
    ctx.font = 'bold 11px Segoe UI, Arial';
    ctx.textAlign = 'center';
    ctx.fillText('CUP', x + CUW / 2, y + CUH / 2 + 4);
  }

  ctx.restore();
}

function drawUserPath() {
  if (path.length < 2) return;
  ctx.save();
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';

  // Glow
  ctx.shadowColor = 'rgba(79,195,247,0.45)';
  ctx.shadowBlur  = 10;
  ctx.strokeStyle = 'rgba(79,195,247,0.55)';
  ctx.lineWidth   = 8;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);
  for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
  ctx.stroke();

  // Core
  ctx.shadowBlur  = 0;
  ctx.strokeStyle = 'rgba(179,229,252,0.45)';
  ctx.lineWidth   = 3;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);
  for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
  ctx.stroke();

  ctx.restore();
}

function drawSnapGuide() {
  if (state !== 'DRAWING' || path.length > 0) return;
  const o = outletPos();
  const a = Math.sin(tick * 0.07) * 0.35 + 0.65;
  ctx.save();
  ctx.globalAlpha = a;
  ctx.strokeStyle = '#FFD54F';
  ctx.lineWidth   = 2;
  ctx.setLineDash([6, 6]);
  ctx.beginPath();
  ctx.arc(o.x, o.y, SNAP_R * 0.65, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawWaterTrail() {
  for (let i = 0; i < trail.length; i++) {
    const p = trail[i];
    const a = i / trail.length;
    ctx.save();
    ctx.globalAlpha = a * 0.92 + 0.08;
    const r = 6 + a * 8;
    const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
    grd.addColorStop(0,   '#E1F5FE');
    grd.addColorStop(0.4, '#29B6F6');
    grd.addColorStop(1,   'rgba(3,155,229,0)');
    ctx.shadowColor = '#29B6F6';
    ctx.shadowBlur  = 18;
    ctx.fillStyle   = grd;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawSparks() {
  for (const p of sparks) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowColor = `hsl(${p.hue},80%,60%)`;
    ctx.shadowBlur  = 10;
    ctx.fillStyle   = `hsl(${p.hue},80%,65%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawOverlay() {
  if (state !== 'WIN' && state !== 'LOSE') return;
  ctx.save();
  const win = state === 'WIN';
  ctx.fillStyle = win ? 'rgba(0,230,118,0.07)' : 'rgba(255,82,82,0.07)';
  ctx.fillRect(0, 0, CW, CH);
  ctx.fillStyle   = 'white';
  ctx.font        = `bold 44px Segoe UI, Arial`;
  ctx.textAlign   = 'center';
  ctx.shadowColor = win ? '#00E676' : '#FF5252';
  ctx.shadowBlur  = 24;
  ctx.fillText(win ? '🎉 You Win!' : '💧 Missed!', CW / 2, CH / 2);
  ctx.restore();
}

// ─── Main loop ───────────────────────────────────────────────
function update() {
  tick++;

  if (state === 'FLOWING') {
    flowT += 0.007;
    if (flowT >= 1) {
      flowT = 1;
      trail.push(posOnPath(1));
      waterLandsInCup() ? onWin() : onLose();
    } else {
      trail.push(posOnPath(flowT));
      if (trail.length > 55) trail.shift();
    }
  }

  if (state === 'FILLING') {
    cupFill += 0.018;           // ~55 ticks to fill = ~0.9s at 60fps
    if (cupFill >= 1) {
      cupFill = 1;
      triggerWin();
    }
  }

  for (const p of sparks) {
    p.x    += p.vx;
    p.y    += p.vy;
    p.vy   += 0.28;
    p.life -= p.decay;
  }
  sparks = sparks.filter(p => p.life > 0);
}

function render() {
  ctx.clearRect(0, 0, CW, CH);
  drawBg();
  drawUserPath();
  drawTank(lv().tank.x, lv().tank.y);
  drawCup(lv().cup.x, lv().cup.y);
  drawSnapGuide();
  drawWaterTrail();
  drawSparks();
  drawOverlay();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>
